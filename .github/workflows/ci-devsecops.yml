name: DevSecOps CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test-scan:
    name: Build, Test & Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write # Necesario para subir reportes de seguridad

    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para algunos escáneres de seguridad

      # --- 2. SECURITY SCAN (Early & Often) ---
      - name: 2a. Secret Scanning (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --debug --only-verified

      # - name: 2b. SAST Scan (SonarCloud)
      #   # Asumiendo que configuras SonarCloud. Es gratis para repos públicos.
      #   uses: SonarSource/sonarcloud-github-action@master
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          
      # --- 3. BUILD & UNIT TEST (PYTHON) ---
      - name: 3a. Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Acelera el pipeline guardando en caché las librerías
          
      - name: 3b. Install Dependencies & Test
        run: |
          pip install -r requirements.txt
          pytest

      # --- 4. PACKAGE (Docker Build) ---
      - name: 4a. Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 4b. Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- NUEVO PASO: Convertir nombre a minúsculas ---
      - name: Formatear nombre del repositorio a minúsculas
        run: |
          echo "REPO_MINUSCULAS=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: 4c. Build and export to Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true 
          # Usamos la nueva variable en minúsculas
          tags: ghcr.io/${{ env.REPO_MINUSCULAS }}/myapp:${{ github.sha }}

      # --- 5. CONTAINER SECURITY SCAN ---
      - name: 5a. Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ env.REPO_MINUSCULAS }}/myapp:${{ github.sha }}'
          format: 'table'
          exit-code: '1' 
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # --- 6. PUSH ---
      - name: 6a. Push to GHCR
        if: success() 
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.REPO_MINUSCULAS }}/myapp:${{ github.sha }}
            ghcr.io/${{ env.REPO_MINUSCULAS }}/myapp:latest